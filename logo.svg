<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="200px" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Logo Symbol</title>
    <defs>
        <rect id="inner-frame-square" width="50" height="50" x="0" y="0"></rect>
        <circle id="choice-circle" cx="25" cy="25" r="10"></circle>
    </defs>
    <g id="Logo-Symbol" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="Frame-Cube">
            <rect width="190" height="190" x="5" y="5" fill="#FFFFFF"></rect>
        </g>
        <g id="Inner-Frame" transform="translate(25, 25)">
            <rect width="150" height="150" x="0" y="0" fill="#424242"></rect>
            <g id="9-Squares-Matrix" transform="translate(50, 50) scale(0.8)">
                <!-- Row 1 -->
                <use xlink:href="#inner-frame-square" transform="translate(0, -100)" fill="#FFFFFF"></use>
                <use xlink:href="#inner-frame-square" transform="translate(50, -100)" fill="#E0E0E0"></use>
                <use xlink:href="#inner-frame-square" transform="translate(100, -100)" fill="#FFFFFF"></use>
                <!-- Row 2 -->
                <use xlink:href="#inner-frame-square" transform="translate(0, 0)" fill="#E0E0E0"></use>
                <use xlink:href="#inner-frame-square" transform="translate(50, 0)" fill="#FFFFFF"></use>
                <use xlink:href="#inner-frame-square" transform="translate(100, 0)" fill="#E0E0E0"></use>
                <!-- Row 3 -->
                <use xlink:href="#inner-frame-square" transform="translate(0, 100)" fill="#FFFFFF"></use>
                <use xlink:href="#inner-frame-square" transform="translate(50, 100)" fill="#E0E0E0"></use>
                <use xlink:href="#inner-frame-square" transform="translate(100, 100)" fill="#FFFFFF"></use>
            </g>
            <g id="Choices" transform="translate(25, 25) scale(0.8)">
                <use xlink:href="#choice-circle" transform="translate(0, -50)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(50, -50)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(100, -50)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(0, 0)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(50, 0)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(100, 0)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(0, 50)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(50, 50)" fill="#FFFFFF"></use>
                <use xlink:href="#choice-circle" transform="translate(100, 50)" fill="#FFFFFF"></use>
            </g>
            <g id="Flow-Lines" transform="translate(75, 75)">
                <path d="M 0 0 L 50 50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"></path>
                <path d="M 0 0 L -50 50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"></path>
                <path d="M 0 0 L 0 50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"></path>
            </g>
        </g>
    </g>
</svg>